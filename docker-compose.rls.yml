services:
  workspace-service:
    environment:
      APP_RLS_ENABLED: "true"
      APP_RLS_STRICT_WORKSPACE_HEADER: "true"
      DB_RUNTIME_USER: ${WORKSPACE_DB_RUNTIME_USER:-notebook}
      DB_RUNTIME_PASSWORD: ${WORKSPACE_DB_RUNTIME_PASSWORD:-notebook}
      DB_MIGRATION_USER: ${WORKSPACE_DB_MIGRATION_USER:-notebook}
      DB_MIGRATION_PASSWORD: ${WORKSPACE_DB_MIGRATION_PASSWORD:-notebook}
      SPRING_FLYWAY_USER: ${WORKSPACE_DB_MIGRATION_USER:-notebook}
      SPRING_FLYWAY_PASSWORD: ${WORKSPACE_DB_MIGRATION_PASSWORD:-notebook}

  content-service:
    environment:
      APP_RLS_ENABLED: "true"
      APP_RLS_STRICT_WORKSPACE_HEADER: "true"
      DB_RUNTIME_USER: ${CONTENT_DB_RUNTIME_USER:-notebook}
      DB_RUNTIME_PASSWORD: ${CONTENT_DB_RUNTIME_PASSWORD:-notebook}
      DB_MIGRATION_USER: ${CONTENT_DB_MIGRATION_USER:-notebook}
      DB_MIGRATION_PASSWORD: ${CONTENT_DB_MIGRATION_PASSWORD:-notebook}
      SPRING_FLYWAY_USER: ${CONTENT_DB_MIGRATION_USER:-notebook}
      SPRING_FLYWAY_PASSWORD: ${CONTENT_DB_MIGRATION_PASSWORD:-notebook}
