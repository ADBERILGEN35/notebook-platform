global:
  imageRegistry: "registry.example.com"
  imagePullPolicy: IfNotPresent
  springProfilesActive: prod

config:
  otelEnabled: "true"
  otelExporterOtlpEndpoint: "http://otel-collector.observability:4318/v1/traces"
  corsAllowedOrigins: "https://app.example.com"
  # Production steady-state target only. Follow docs/runtime-rls-rollout.md stage by stage.
  # FORCE RLS is never applied by Helm or GitOps auto-sync.
  appRlsEnabled: "true"
  appRlsStrictWorkspaceHeader: "true"
  internalAuthMode: "service-jwt"
  jwtAllowEphemeralKeys: "false"
  jwtActiveKid: "prod-key-1"
  internalServiceJwtActiveKid: "content-service-key-1"

externalDatabase:
  identityUrl: "jdbc:postgresql://postgres.example.internal:5432/notebook_platform"
  workspaceRuntimeUrl: "jdbc:postgresql://postgres.example.internal:5432/notebook_platform"
  contentRuntimeUrl: "jdbc:postgresql://postgres.example.internal:5432/notebook_platform"
  identityUser: "notebook_identity"
  workspaceRuntimeUser: "notebook_workspace_runtime"
  workspaceMigrationUser: "notebook_workspace_migrator"
  contentRuntimeUser: "notebook_content_runtime"
  contentMigrationUser: "notebook_content_migrator"

externalRedis:
  host: "redis.example.internal"
  port: "6379"
  tlsEnabled: false

secrets:
  mode: external-secrets
  create: false
  existingSecret: ""
  externalSecrets:
    enabled: true
    refreshInterval: 1h
    secretStoreRef:
      name: notebook-platform-secret-store
      kind: ClusterSecretStore
    targetSecretName: notebook-platform-secrets

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-example-com-tls
      hosts:
        - api.example.com

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: false

autoscaling:
  enabled: false
  apiGateway:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  identity:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  workspace:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  content:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
