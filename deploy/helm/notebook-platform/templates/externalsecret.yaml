{{- if and (eq .Values.secrets.mode "external-secrets") .Values.secrets.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "notebook-platform.fullname" . }}-external-secret
  namespace: {{ include "notebook-platform.namespace" . }}
  labels:
    {{- include "notebook-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "secrets.externalSecrets.secretStoreRef.name is required when external-secrets mode is enabled" .Values.secrets.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.secrets.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" | quote }}
  target:
    name: {{ include "notebook-platform.secretName" . }}
    creationPolicy: {{ .Values.secrets.externalSecrets.creationPolicy | default "Owner" | quote }}
    deletionPolicy: {{ .Values.secrets.externalSecrets.deletionPolicy | default "Retain" | quote }}
  data:
    {{- range .Values.secrets.externalSecrets.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        {{- toYaml .remoteRef | nindent 8 }}
    {{- end }}
{{- end }}
