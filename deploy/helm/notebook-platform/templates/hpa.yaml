{{- if .Values.autoscaling.enabled }}
{{- $root := . }}
{{- $components := list
  (dict "key" "apiGateway" "component" "api-gateway" "service" .Values.services.apiGateway "hpa" .Values.autoscaling.apiGateway)
  (dict "key" "identity" "component" "identity" "service" .Values.services.identity "hpa" .Values.autoscaling.identity)
  (dict "key" "workspace" "component" "workspace" "service" .Values.services.workspace "hpa" .Values.autoscaling.workspace)
  (dict "key" "content" "component" "content" "service" .Values.services.content "hpa" .Values.autoscaling.content)
}}
{{- range $item := $components }}
{{- if and $item.service.enabled $item.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "notebook-platform.componentName" (dict "root" $root "component" $item.component) }}
  namespace: {{ include "notebook-platform.namespace" $root }}
  labels:
    {{- include "notebook-platform.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $item.component }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "notebook-platform.componentName" (dict "root" $root "component" $item.component) }}
  minReplicas: {{ $item.hpa.minReplicas }}
  maxReplicas: {{ $item.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $item.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}
