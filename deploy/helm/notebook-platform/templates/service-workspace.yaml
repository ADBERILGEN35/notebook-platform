{{- if .Values.services.workspace.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notebook-platform.componentName" (dict "root" . "component" "workspace") }}
  namespace: {{ include "notebook-platform.namespace" . }}
  labels:
    {{- include "notebook-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
spec:
  type: ClusterIP
  selector:
    {{- include "notebook-platform.selectorLabels" (dict "root" . "component" "workspace") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.workspace.port }}
      targetPort: http
{{- end }}
