{{- if .Values.services.workspace.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notebook-platform.componentName" (dict "root" . "component" "workspace") }}
  namespace: {{ include "notebook-platform.namespace" . }}
  labels:
    {{- include "notebook-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
spec:
  replicas: {{ .Values.services.workspace.replicas }}
  selector:
    matchLabels:
      {{- include "notebook-platform.selectorLabels" (dict "root" . "component" "workspace") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "notebook-platform.selectorLabels" (dict "root" . "component" "workspace") | nindent 8 }}
        app.kubernetes.io/part-of: notebook-platform
      annotations:
        {{- include "notebook-platform.podAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "notebook-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: workspace-service
          image: {{ include "notebook-platform.image" (dict "root" . "image" .Values.services.workspace.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.services.workspace.port }}
          envFrom:
            - configMapRef:
                name: {{ include "notebook-platform.fullname" . }}-config
          env:
            - name: SERVER_PORT
              value: {{ .Values.services.workspace.port | quote }}
            - name: SERVICE_NAME
              value: workspace-service
            {{- include "notebook-platform.otelSecretEnv" . | nindent 12 }}
            - name: DB_RUNTIME_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "notebook-platform.fullname" . }}-config
                  key: WORKSPACE_DB_RUNTIME_URL
            - name: DB_RUNTIME_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "notebook-platform.fullname" . }}-config
                  key: WORKSPACE_DB_RUNTIME_USER
            - name: DB_RUNTIME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "notebook-platform.secretName" . }}
                  key: workspace-db-runtime-password
                  optional: false
            - name: SPRING_FLYWAY_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "notebook-platform.fullname" . }}-config
                  key: WORKSPACE_DB_MIGRATION_USER
            - name: SPRING_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "notebook-platform.secretName" . }}
                  key: workspace-db-migration-password
                  optional: false
            - name: INTERNAL_API_TOKEN_PRIMARY
              valueFrom:
                secretKeyRef:
                  name: {{ include "notebook-platform.secretName" . }}
                  key: internal-api-token-primary
                  optional: true
            - name: INTERNAL_API_TOKEN_SECONDARY
              valueFrom:
                secretKeyRef:
                  name: {{ include "notebook-platform.secretName" . }}
                  key: internal-api-token-secondary
                  optional: true
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            {{- omit .Values.probes.readiness "path" | toYaml | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            {{- omit .Values.probes.liveness "path" | toYaml | nindent 12 }}
          resources:
            {{- toYaml .Values.services.workspace.resources | nindent 12 }}
          volumeMounts:
            {{- include "notebook-platform.volumeMounts" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "notebook-platform.secretVolume" . | nindent 8 }}
{{- end }}
