apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notebook-platform-staging
  namespace: argocd
spec:
  project: notebook-platform
  sources:
    - repoURL: https://github.com/ORG/REPO.git
      targetRevision: main
      path: deploy/helm/notebook-platform
      helm:
        valueFiles:
          - $values/deploy/gitops/environments/staging/values.yaml
    - repoURL: https://github.com/ORG/REPO.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: notebook-staging
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
