apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: notebook-platform-disallow-latest-tag
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-immutable-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Images must use immutable tags or digests; latest is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
            =(initContainers):
              - image: "!*:latest"
