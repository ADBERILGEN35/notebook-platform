global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8081"]

  - job_name: workspace-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["workspace-service:8082"]

  - job_name: content-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["content-service:8083"]
