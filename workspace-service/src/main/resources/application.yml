server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: workspace-service
  datasource:
    url: ${DB_RUNTIME_URL:${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notebook_platform}}}
    username: ${DB_RUNTIME_USER:${DB_USER:notebook}}
    password: ${DB_RUNTIME_PASSWORD:${DB_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: workspace_flyway_schema_history

management:
  tracing:
    enabled: ${OTEL_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  rls:
    enabled: ${APP_RLS_ENABLED:false}
    strict-workspace-header: ${APP_RLS_STRICT_WORKSPACE_HEADER:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

workspace:
  invitations:
    ttl-days: ${INVITATION_TTL_DAYS:7}
    accept-base-url: ${INVITATION_ACCEPT_BASE_URL:http://localhost:3000/invitations/accept}
    expose-token-in-response: ${INVITATION_EXPOSE_TOKEN_IN_RESPONSE:true}
  identity:
    service-url: ${IDENTITY_SERVICE_URL:http://identity-service:8081}
    timeout-ms: ${IDENTITY_CLIENT_TIMEOUT_MS:1000}
    circuit-breaker-failure-threshold: ${IDENTITY_CLIENT_CB_FAILURE_THRESHOLD:50}
    circuit-breaker-open-state-ms: ${IDENTITY_CLIENT_CB_OPEN_STATE_MS:10000}
    retry-max-attempts: ${IDENTITY_CLIENT_RETRY_MAX_ATTEMPTS:2}
  internal:
    api-token: ${INTERNAL_API_TOKEN:}
    primary-token: ${INTERNAL_API_TOKEN_PRIMARY:${INTERNAL_API_TOKEN:}}
    secondary-token: ${INTERNAL_API_TOKEN_SECONDARY:}

