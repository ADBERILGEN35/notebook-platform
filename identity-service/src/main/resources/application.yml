server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notebook_platform}
    username: ${DB_USER:notebook}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  tracing:
    enabled: ${OTEL_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL:300}
  refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL:604800}
  private-key: ${JWT_PRIVATE_KEY:}
  private-key-path: ${JWT_PRIVATE_KEY_PATH:}
  public-key: ${JWT_PUBLIC_KEY:}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:}
  allow-ephemeral-keys: ${JWT_ALLOW_EPHEMERAL_KEYS:true}
  keys:
    active-kid: ${JWT_KEYS_ACTIVE_KID:primary}
    signing-keys:
      - kid: ${JWT_KEYS_SIGNING_KEYS_0_KID:}
        private-key: ${JWT_KEYS_SIGNING_KEYS_0_PRIVATE_KEY:}
        private-key-path: ${JWT_KEYS_SIGNING_KEYS_0_PRIVATE_KEY_PATH:}
        public-key: ${JWT_KEYS_SIGNING_KEYS_0_PUBLIC_KEY:}
        public-key-path: ${JWT_KEYS_SIGNING_KEYS_0_PUBLIC_KEY_PATH:}
      - kid: ${JWT_KEYS_SIGNING_KEYS_1_KID:}
        private-key: ${JWT_KEYS_SIGNING_KEYS_1_PRIVATE_KEY:}
        private-key-path: ${JWT_KEYS_SIGNING_KEYS_1_PRIVATE_KEY_PATH:}
        public-key: ${JWT_KEYS_SIGNING_KEYS_1_PUBLIC_KEY:}
        public-key-path: ${JWT_KEYS_SIGNING_KEYS_1_PUBLIC_KEY_PATH:}

security:
  argon2:
    # Default: reasonably safe values for dev; test profile will override.
    salt-length: ${ARGON2_SALT_LENGTH:16}
    hash-length: ${ARGON2_HASH_LENGTH:32}
    parallelism: ${ARGON2_PARALLELISM:1}
    memory-in-kb: ${ARGON2_MEMORY_IN_KB:65536}
    iterations: ${ARGON2_ITERATIONS:3}

